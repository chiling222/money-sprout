<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#10A567">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="萌芽記帳">
<title>萌芽記帳</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --paper:#FCFBF7;--card:#FFFFFF;--ink:#15231C;--ink-soft:#67746B;--ink-faint:#9AA69E;--line:#EDEFEA;
  --jade:#10A567;--jade-deep:#0A7A4D;--jade-soft:#E2F4EB;
  --coral:#FF5A3C;--coral-soft:#FFE7E1;--butter:#FFB72B;--butter-soft:#FFF1D4;
  --shadow-sm:0 8px 20px -12px rgba(20,50,35,.25);
  --font-num:'Fredoka','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
  --font-body:'PingFang TC','Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif;
  --nav-h:74px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:var(--font-body);color:var(--ink);
  background:radial-gradient(900px 500px at 15% -8%,#F4E8D4 0%,transparent 55%),radial-gradient(700px 600px at 110% 25%,#DFF0E5 0%,transparent 50%),#E7EFE9;overscroll-behavior:none}
#app{position:relative;width:100%;max-width:480px;margin:0 auto;height:100dvh;height:100svh;background:var(--paper);display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 60px -20px rgba(20,50,35,.25)}
.view{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:calc(env(safe-area-inset-top) + 10px) 18px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px);scroll-behavior:smooth}
.view::-webkit-scrollbar{display:none}
.view.noscroll{overflow:hidden;display:flex;flex-direction:column;padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 10px)}
.screen{animation:rise .42s cubic-bezier(.2,.8,.25,1)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.hi{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 14px}
.hi h1{font-family:var(--font-num);font-weight:600;font-size:22px}
.hi .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD98A,#FF9F43);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow-sm);cursor:pointer}
.avatar.logo{background:transparent;padding:0;overflow:hidden}
.avatar.logo img{width:100%;height:100%;object-fit:cover;display:block}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}
.card{background:var(--card);border-radius:24px;padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.sec-title{font-family:var(--font-num);font-weight:600;font-size:15px;margin:22px 4px 12px;display:flex;align-items:center;gap:7px}
.sec-title .more{margin-left:auto;font-family:var(--font-body);font-weight:500;font-size:12px;color:var(--jade);background:var(--jade-soft);padding:4px 11px;border-radius:20px;cursor:pointer}

.empty{text-align:center;padding:30px 18px;color:var(--ink-faint)}
.empty .ee{font-size:40px}
.empty .et{font-size:13.5px;margin-top:10px;line-height:1.6}

.donutcard{display:flex;flex-direction:column;align-items:center}
.donutwrap{position:relative;width:188px;height:188px;margin:4px 0 2px}
.donutwrap .ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donutwrap .ctr .cv{font-family:var(--font-num);font-weight:700;font-size:25px;letter-spacing:-.5px}
.donutwrap .ctr .cl{font-size:11.5px;color:var(--ink-soft);margin-top:1px}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;margin-top:8px}
.legend .lg{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft)}
.legend .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.legend .lg b{font-family:var(--font-num);color:var(--ink);font-weight:600}
.savednote{font-size:11.5px;color:var(--jade-deep);background:var(--jade-soft);padding:6px 12px;border-radius:20px;margin-top:12px;font-weight:600}

.flow{display:flex;gap:10px;margin-top:14px}
.flow .card{flex:1;padding:14px 12px;text-align:left}
.flow .t{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:4px}
.flow .v{font-family:var(--font-num);font-weight:600;font-size:17px;margin-top:5px}

.networth{display:flex;flex-direction:column;cursor:pointer}
.networth .nwtop{display:flex;align-items:center;justify-content:space-between}
.networth .nwt{font-size:12.5px;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.networth .nwv{font-family:var(--font-num);font-weight:700;font-size:24px;margin-top:3px}
.networth .edit{font-size:11px;font-weight:600;color:var(--jade);background:var(--jade-soft);padding:4px 10px;border-radius:20px}
.networth .nwsplit{display:flex;gap:8px;margin-top:14px}
.networth .nwsplit div{flex:1;background:#F5F7F2;border-radius:13px;padding:9px 11px}
.networth .nwsplit .t{font-size:10.5px;color:var(--ink-soft)}
.networth .nwsplit .v{font-family:var(--font-num);font-weight:600;font-size:14px;margin-top:2px}

.alert{display:flex;align-items:center;gap:10px;background:var(--coral-soft);border:1px solid #FFD6CC;border-radius:18px;padding:13px 15px;margin-top:6px}
.alert .ax{font-size:20px}
.alert .at{font-size:12.5px;color:#B23A22;font-weight:600;line-height:1.5}

.bar{height:9px;border-radius:8px;background:#EFF1ED;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:8px;transition:width .7s cubic-bezier(.2,.8,.25,1)}
.bar.lg{height:12px}

.alloc{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.alloc:last-child{border-bottom:none}
.alloc .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alloc .mid{flex:1;min-width:0}
.alloc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.alloc .nm{font-weight:600;font-size:13.5px}
.alloc .val{font-family:var(--font-num);font-weight:600;font-size:14px}
.warnchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--coral-soft);color:var(--coral);animation:pulse 1.4s ease-in-out infinite}
.overchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--coral);color:#fff}
.okchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--jade-soft);color:var(--jade-deep)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.96)}}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:8px;background:#EFF1ED;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--jade);box-shadow:0 3px 8px rgba(0,0,0,.18)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--jade)}

.addscreen{flex:1;display:flex;flex-direction:column;width:100%}
.seg{display:flex;background:#EEF1EC;border-radius:14px;padding:4px;gap:4px;margin:2px 0 4px}
.seg button{flex:1;border:none;background:transparent;padding:10px 4px;border-radius:11px;font-family:var(--font-num);font-weight:600;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:.15s}
.seg button.on{background:#fff;color:var(--jade-deep);box-shadow:var(--shadow-sm)}
.amount-display{text-align:center;padding:14px 0 6px}
.amount-display .lbl{font-size:12px;color:var(--ink-soft)}
.amount-display .big{font-family:var(--font-num);font-weight:700;font-size:44px;letter-spacing:-1px;margin-top:4px;line-height:1}
.amount-display .big.inc{color:var(--jade)}
.amount-display .big small{font-size:24px;color:var(--ink-faint);margin-right:4px}
.chips{display:flex;gap:8px;overflow-x:auto;padding:4px 2px 8px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 4px;width:62px;border-radius:15px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;transition:.18s}
.chip .e{font-size:20px}
.chip .n{font-size:10.5px;font-weight:600;color:var(--ink-soft)}
.chip.on{border-color:var(--jade);background:var(--jade-soft);transform:translateY(-2px)}
.chip.on .n{color:var(--jade-deep)}
.chip.add{border-style:dashed;color:var(--ink-faint)}
.note-in{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:12px 14px;font-family:var(--font-body);font-size:16px}
.note-in:focus{outline:none;border-color:var(--jade)}
.binput{display:inline-flex;align-items:center;gap:1px;border:1.5px solid var(--line);border-radius:11px;padding:5px 11px;background:var(--card)}
.binput .cur{color:var(--ink-faint);font-weight:600;font-family:var(--font-num);font-size:14px}
.binput input{width:84px;border:none;outline:none;background:transparent;text-align:right;font-family:var(--font-num);font-weight:600;font-size:16px;color:var(--ink)}
.binput:focus-within{border-color:var(--jade)}
.daterow{display:flex;align-items:center;justify-content:space-between;margin-top:8px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 14px}
.daterow .dl{font-size:13px;color:var(--ink-soft);font-weight:600}
.daterow input{border:none;background:transparent;font-family:var(--font-num);font-size:15px;color:var(--ink);font-weight:600;text-align:right}
.daterow input:focus{outline:none}
.backbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--line);background:var(--card);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0}
select.note-in{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%2367746B' stroke-width='2' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 16px center;padding-right:36px}
.mgroup{margin-bottom:18px}
.mhead{display:flex;justify-content:space-between;align-items:baseline;margin:0 4px 8px;font-family:var(--font-num);font-weight:600;font-size:14px}
.mhead .msum{font-size:11.5px;color:var(--ink-soft);font-weight:600}
.rangenav{display:flex;align-items:center;gap:8px;margin-top:8px}
.rangenav button{width:40px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--card);font-size:18px;cursor:pointer;color:var(--ink-soft);flex-shrink:0}
.rangenav input{flex:1;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-family:var(--font-num);font-size:15px;text-align:center;background:var(--card);min-width:0}
.rangenav .ryear{flex:1;text-align:center;font-family:var(--font-num);font-weight:600;font-size:16px;padding:10px}
.customrange{display:flex;align-items:center;gap:8px;margin-top:8px}
.customrange input{flex:1;min-width:0;border:1px solid var(--line);border-radius:11px;padding:11px 10px;font-family:var(--font-num);font-size:14px;text-align:center;background:var(--card)}
.customrange span{color:var(--ink-faint);flex-shrink:0}
.rangesum{display:flex;justify-content:space-around;text-align:center;margin-bottom:14px;padding:14px}
.rangesum .t{font-size:11px;color:var(--ink-soft)}
.rangesum .v{font-family:var(--font-num);font-weight:700;font-size:17px;margin-top:4px}
.addbottom{margin-top:auto}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:10px}
.key{padding:15px 0;border-radius:15px;background:var(--card);border:1px solid var(--line);font-family:var(--font-num);font-weight:600;font-size:22px;text-align:center;cursor:pointer;transition:.1s;user-select:none}
.key:active{transform:scale(.93);background:var(--jade-soft)}
.btn{display:block;width:100%;border:none;background:var(--jade);color:#fff;font-family:var(--font-num);font-weight:600;font-size:16px;padding:15px;border-radius:18px;cursor:pointer;box-shadow:0 12px 22px -10px rgba(16,165,103,.8);transition:.15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--jade-soft);color:var(--jade-deep);box-shadow:none}
.btn.danger{background:var(--coral-soft);color:var(--coral);box-shadow:none}

.goal{position:relative;overflow:hidden}
.goal .head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.goal .ge{width:46px;height:46px;border-radius:14px;background:var(--jade-soft);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.goal .gt{font-weight:700;font-size:15.5px}
.goal .gd{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.goal .gright{margin-left:auto;text-align:right}
.goal .gright .p{font-family:var(--font-num);font-weight:700;font-size:18px;color:var(--jade)}
.goal .grow{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:10px}
.goal .grow b{font-family:var(--font-num);color:var(--ink)}
.goal.done{background:linear-gradient(150deg,#FFF6E0,#FFFDF6);border-color:#FFE3A8}
.ribbon{position:absolute;top:13px;right:-30px;transform:rotate(38deg);background:var(--butter);color:#5a3c00;font-weight:700;font-size:10px;padding:3px 34px;font-family:var(--font-num)}
.gsave{margin-top:12px;width:100%;border:1.5px dashed var(--line);background:transparent;color:var(--jade-deep);font-weight:600;font-size:13px;padding:10px;border-radius:14px;cursor:pointer}
.badges{display:flex;gap:10px;flex-wrap:wrap}
.badge{flex:0 0 calc(33.33% - 7px);text-align:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 6px}
.badge .bi{font-size:30px}
.badge.lock .bi{filter:grayscale(1);opacity:.32}
.badge .bn{font-size:11px;font-weight:600;margin-top:7px}
.badge.lock .bn{color:var(--ink-faint)}

.sumcard{display:flex;gap:10px;margin-bottom:4px}
.sumcard .s{flex:1;border-radius:20px;padding:15px;text-align:center;border:1px solid var(--line)}
.sumcard .s .t{font-size:11.5px;color:var(--ink-soft)}
.sumcard .s .v{font-family:var(--font-num);font-weight:700;font-size:21px;margin-top:4px}
.sumcard .s.me{background:var(--jade-soft);border-color:#CBEBD9}
.sumcard .s.me .v{color:var(--jade-deep)}
.sumcard .s.owe{background:var(--coral-soft);border-color:#FFD6CC}
.sumcard .s.owe .v{color:var(--coral)}
.bill{margin-bottom:12px}
.bill.due{border-color:#FFD6CC;box-shadow:0 0 0 2px var(--coral-soft)}
.bill .bh{display:flex;align-items:center;gap:11px}
.bill .be{width:44px;height:44px;border-radius:13px;background:var(--jade-soft);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.bill .bt{font-weight:700;font-size:15px}
.bill .bd{font-size:11.5px;color:var(--ink-soft);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.bill .btot{margin-left:auto;text-align:right}
.bill .btot .v{font-family:var(--font-num);font-weight:700;font-size:18px}
.bill .btot .l{font-size:10px;color:var(--ink-faint)}
.payerchip{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--butter-soft);color:#8a5a00}
.duechip{font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:20px;background:var(--coral);color:#fff}
.mem{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
.mem:nth-child(2){margin-top:12px}
.mem .ma{width:30px;height:30px;border-radius:9px;background:#EEF1EC;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--ink-soft)}
.mem .ma.self{background:var(--jade);color:#fff}
.mem .mn{font-size:13px;font-weight:600}
.mem .ms{margin-left:auto;font-family:var(--font-num);font-weight:600;font-size:13.5px;margin-right:8px}
.paidpill{font-size:10.5px;font-weight:700;padding:4px 11px;border-radius:20px;cursor:pointer;border:none;font-family:var(--font-body)}
.paidpill.yes{background:var(--jade-soft);color:var(--jade-deep)}
.paidpill.no{background:var(--coral-soft);color:var(--coral)}

.tabbar{position:absolute;bottom:0;left:0;right:0;background:rgba(252,251,247,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-around;padding:10px 14px calc(env(safe-area-inset-bottom) + 8px);z-index:50}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--ink-faint);cursor:pointer;width:56px;transition:.15s}
.tab svg{width:24px;height:24px;stroke:var(--ink-faint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--jade-deep)}
.tab.on svg{stroke:var(--jade)}
.fab{width:58px;height:58px;border-radius:20px;background:linear-gradient(150deg,#16b87a,#0b8a55);margin-top:-16px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 24px -8px rgba(11,138,85,.9);cursor:pointer;transition:.15s}
.fab:active{transform:scale(.93)}
.fab svg{width:28px;height:28px;stroke:#fff;stroke-width:2.6;fill:none;stroke-linecap:round}

.toast{position:absolute;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.35s;z-index:120;white-space:nowrap;box-shadow:var(--shadow-sm);max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:absolute;inset:0;background:rgba(20,35,28,.42);backdrop-filter:blur(3px);display:flex;align-items:flex-end;z-index:80;opacity:0;pointer-events:none;transition:.25s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{background:var(--paper);width:100%;border-radius:28px 28px 0 0;padding:22px 22px calc(env(safe-area-inset-bottom) + 28px);transform:translateY(100%);transition:.32s cubic-bezier(.2,.8,.25,1);max-height:90%;overflow-y:auto}
.overlay.show .sheet{transform:none}
.sheet h3{font-family:var(--font-num);font-weight:600;font-size:19px;margin-bottom:5px}
.sheet p{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;line-height:1.6}
.sheet .fld{font-size:12px;font-weight:600;color:var(--ink-soft);margin:14px 2px 7px}
.sheet .note-in{margin-bottom:2px}
.fieldrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.fieldrow .fe{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fieldrow .fl{font-size:13px;font-weight:600;flex:1}
.fieldrow input{width:130px;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-family:var(--font-num);font-weight:600;font-size:16px;text-align:right}
.fieldrow input:focus{outline:none;border-color:var(--jade)}
.pillrow{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:9px 14px;border-radius:13px;border:1.5px solid var(--line);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--ink-soft)}
.pill.on{border-color:var(--jade);background:var(--jade-soft);color:var(--jade-deep)}
.pill .x{margin-left:6px;opacity:.5}
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
.emoji-pick span{width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.emoji-pick span.on{border-color:var(--jade);background:var(--jade-soft)}
hr{border:none;border-top:1px solid var(--line);margin:18px 0}
.gate{position:absolute;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;background:radial-gradient(700px 400px at 50% -10%,#F4E8D4 0%,transparent 55%),linear-gradient(160deg,#EAF3EC,#DFF0E5)}
.gatecard{max-width:330px}
.gatelogo{width:98px;height:98px;border-radius:26px;overflow:hidden;margin:0 auto 20px;box-shadow:0 14px 30px -12px rgba(20,50,35,.4)}
.gatelogo img{width:100%;height:100%;object-fit:cover;display:block}
.gate h2{font-family:var(--font-num);font-weight:700;font-size:27px}
.gate .gp{color:var(--ink-soft);font-size:13.5px;line-height:1.7;margin:10px 0 28px}
.gbtn{display:inline-flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px 24px;font-size:15px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-sm)}
.gbtn:active{transform:scale(.98)}
.gatehint{margin-top:18px;font-size:12px;color:var(--ink-faint);min-height:16px;line-height:1.6}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <div class="view" id="view"></div>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
  <div class="gate" id="gate">
    <div class="gatecard">
      <div class="gatelogo"><img src="icon-192.png" alt="萌芽記帳"></div>
      <h2>萌芽記帳</h2>
      <div class="gp">讓存錢像養成遊戲 🌱<br>用 Google 登入，換手機資料也都在。</div>
      <button class="gbtn" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.89 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.34A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.72a5.4 5.4 0 0 1 0-3.44V4.94H.96a9 9 0 0 0 0 8.12l3.01-2.34z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 .96 4.94l3.01 2.34C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
        用 Google 登入
      </button>
      <div class="gatehint" id="gatehint"></div>
    </div>
  </div>
  <nav class="tabbar" id="tabbar">
    <div class="tab on" data-go="home"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>首頁</div>
    <div class="tab" data-go="budget"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><rect x="7" y="11" width="3" height="8" rx="1"/><rect x="12" y="7" width="3" height="12" rx="1"/><rect x="17" y="14" width="3" height="5" rx="1"/></svg>預算</div>
    <div class="fab" data-go="add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="tab" data-go="goals"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>目標</div>
    <div class="tab" data-go="split"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M3.5 19a5.5 5.5 0 0 1 11 0"/><path d="M16 6.5a3 3 0 0 1 0 5.6"/><path d="M17.5 19a5.5 5.5 0 0 0-2-4.3"/></svg>分帳</div>
  </nav>
</div>

<script>
/* ===================== Firebase 設定 =====================
   到 Firebase 主控台 → 專案設定 → 你的應用程式，把那串 config 複製過來，
   貼進下面對應欄位（取代每個 PASTE_...）。貼好後重新上傳，登入功能就會自動啟用。
   還沒貼之前，App 會維持單機模式（資料只存在這支手機），照常可用。            */
const firebaseConfig = {
  apiKey: "PASTE_API_KEY",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_STORAGE_BUCKET",
  messagingSenderId: "PASTE_SENDER_ID",
  appId: "PASTE_APP_ID"
};
/* ======================================================== */

const LS_KEY='moneysprout_v1';
const DAY=86400000;

function defaultCats(){return [
  {id:'exp_food',  kind:'expense', name:'餐飲生活', emoji:'🍜', color:'#FF7A59', budget:0, tags:[]},
  {id:'exp_trans', kind:'expense', name:'交通出行', emoji:'🚌', color:'#FF9F43', budget:0, tags:[]},
  {id:'exp_home',  kind:'expense', name:'居家住房', emoji:'🏠', color:'#F76B6B', budget:0, tags:[]},
  {id:'exp_shop',  kind:'expense', name:'購物消費', emoji:'🛍️', color:'#FF8552', budget:0, tags:[]},
  {id:'exp_health',kind:'expense', name:'健康醫療', emoji:'🏥', color:'#FF8FA3', budget:0, tags:[]},
  {id:'exp_study', kind:'expense', name:'學習工作', emoji:'📚', color:'#FFA94D', budget:0, tags:[]},
  {id:'exp_fun',   kind:'expense', name:'娛樂社交', emoji:'🎉', color:'#FF6F91', budget:0, tags:[]},
  {id:'exp_fin',   kind:'expense', name:'財務支出', emoji:'🏦', color:'#E8823A', budget:0, tags:[]},
  {id:'invest',kind:'transfer',acc:'investment',name:'投資',emoji:'💹',color:'#10A567', budget:0},
  {id:'save', kind:'transfer', acc:'savings',   name:'儲蓄',emoji:'🐷',color:'#FFB72B', budget:0},
];}
function blankState(){
  const now=new Date();
  return {
    meta:{onboarded:false, startedAt:null, version:1, catsV:2},
    settings:{overspendAlertRatio:0.85, splitReminderDays:7},
    month:now.getMonth()+1, year:now.getFullYear(),
    income:0,
    accounts:{cash:0, savings:0, investment:0},
    cats:defaultCats(),
    incomeCats:[
      {id:'inc_work',n:'工作收入',e:'💼',tags:[]},
      {id:'inc_invest',n:'投資理財',e:'📈',tags:[]},
      {id:'inc_gift',n:'禮金／贈與',e:'🎁',tags:[]},
      {id:'inc_other',n:'其他收入',e:'💵',tags:[]},
    ],
    transactions:[],
    goals:[],
    splits:[],
  };
}
const state=blankState();
const ui={ type:'expense', amount:'', cid:'exp_food', incomeCid:'inc_work', saveCid:'save', note:'', date:'', current:'home', dismissable:true, ledgerType:'all', ledgerCat:'all', ledgerSearch:'', ledgerRange:'all', ledgerDay:'', ledgerMonth:'', ledgerYear:0, ledgerFrom:'', ledgerTo:'' };

/* ---------- persistence (graceful if blocked) ---------- */
function persistable(){return {meta:state.meta,settings:state.settings,month:state.month,year:state.year,income:state.income,accounts:state.accounts,cats:state.cats,incomeCats:state.incomeCats,transactions:state.transactions,goals:state.goals,splits:state.splits};}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(persistable()));}catch(e){}if(CLOUD){clearTimeout(cloudSaveTimer);cloudSaveTimer=setTimeout(cloudSave,800);}}
function load(){try{const r=localStorage.getItem(LS_KEY);if(r){const d=JSON.parse(r);Object.keys(d).forEach(k=>{state[k]=d[k];});return true;}}catch(e){}return false;}
function migrateCats(){
  if(!state.meta) return;
  if(state.meta.catsV!==2){
    state.cats=defaultCats();
    state.incomeCats=blankState().incomeCats;
    state.meta.catsV=2;
    ui.cid='exp_food'; ui.incomeCid='inc_work';
    save();
  }
}

/* ---------- Firebase 雲端層 ---------- */
let CLOUD=false, auth=null, db=null, cloudUser=null, cloudSaveTimer=null;
function initCloud(){
  if(typeof firebase==='undefined') return false;
  if(!firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf('PASTE')===0) return false;
  try{
    firebase.initializeApp(firebaseConfig);
    auth=firebase.auth(); db=firebase.firestore();
    try{ db.enablePersistence({synchronizeTabs:true}).catch(function(){}); }catch(e){}
    return true;
  }catch(e){ console.warn('Firebase 初始化失敗',e); return false; }
}
function readLocal(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function applyState(d){ if(!d) return; Object.keys(d).forEach(function(k){ state[k]=d[k]; }); }
function showGate(s){ const g=document.getElementById('gate'); if(g) g.style.display=s?'flex':'none'; }
function loginGoogle(){
  const p=new firebase.auth.GoogleAuthProvider();
  const h=document.getElementById('gatehint'); if(h) h.textContent='登入中…';
  auth.signInWithPopup(p).catch(function(e){
    if(e.code==='auth/popup-closed-by-user'||e.code==='auth/cancelled-popup-request'){ if(h)h.textContent=''; return; }
    if(e.code==='auth/popup-blocked'||e.code==='auth/operation-not-supported-in-this-environment'){ auth.signInWithRedirect(p); return; }
    if(h) h.textContent='登入失敗：'+(e.code||e.message);
  });
}
function logout(){ closeSheet(); if(auth) auth.signOut(); }
function startWithUser(user){
  cloudUser=user;
  const ref=db.collection('users').doc(user.uid);
  ref.get().then(function(snap){
    if(snap.exists && snap.data() && snap.data().state){
      applyState(snap.data().state);
    }else{
      const local=readLocal();
      if(local && local.meta && local.meta.onboarded){
        applyState(local);
        ref.set({state:persistable(), email:user.email||'', updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
          .then(function(){ setTimeout(function(){ toast('已把這支手機的資料搬上雲端 ☁️'); },700); });
      }
    }
  }).catch(function(e){
    const local=readLocal(); if(local) applyState(local);
    console.warn('讀取雲端失敗，改用本機快取',e);
  }).then(function(){
    migrateCats();
    showGate(false); go('home');
    if(!state.meta.onboarded) openOnboarding();
  });
}
function cloudSave(){
  if(!CLOUD||!auth||!auth.currentUser) return;
  db.collection('users').doc(auth.currentUser.uid)
    .set({state:persistable(), email:auth.currentUser.email||'', updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
    .catch(function(e){ console.warn('雲端儲存失敗',e); });
}

/* ---------- helpers ---------- */
const f=n=>'NT$'+Math.round(n).toLocaleString();
const f0=n=>Math.round(n).toLocaleString();
const tint=(hex,a)=>{const x=(hex||'#999999').replace('#','');return `rgba(${parseInt(x.slice(0,2),16)},${parseInt(x.slice(2,4),16)},${parseInt(x.slice(4,6),16)},${a})`};
const catById=id=>state.cats.find(c=>c.id===id);
function monthsLeft(d){const [y,m]=String(d).split('/').map(Number);return Math.max((y-state.year)*12+(m-state.month),1)}
const netWorth=()=>state.accounts.cash+state.accounts.savings+state.accounts.investment;
const spentOf=id=>state.transactions.filter(t=>t.type==='expense'&&t.categoryId===id).reduce((s,t)=>s+t.amount,0);
const movedTo=acc=>state.transactions.filter(t=>t.type==='transfer'&&t.toAccountId===acc).reduce((s,t)=>s+t.amount,0);
const progressOf=c=>c.kind==='expense'?spentOf(c.id):movedTo(c.acc);
const totalExpense=()=>state.cats.filter(c=>c.kind==='expense').reduce((s,c)=>s+spentOf(c.id),0);
const totalMoved=()=>movedTo('savings')+movedTo('investment');
const allocated=()=>state.cats.reduce((s,c)=>s+(c.budget||0),0);
function greet(){const h=new Date().getHours();return h<5?'夜深了':h<11?'早安':h<14?'午安':h<18?'下午好':'晚安';}
function dayN(){if(!state.meta.startedAt)return 1;return Math.floor((Date.now()-state.meta.startedAt)/DAY)+1;}
function timeLabel(ts){const d=new Date(ts);const today=new Date();const same=d.toDateString()===today.toDateString();if(same){const hh=String(d.getHours()).padStart(2,'0'),mm=String(d.getMinutes()).padStart(2,'0');return `今天 ${hh}:${mm}`;}return `${d.getMonth()+1}/${d.getDate()}`;}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function tsToInput(ts){const d=new Date(ts);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function inputToTs(s){if(!s)return Date.now();return new Date(s+'T12:00:00').getTime();}
function applyEffect(t){if(t.type==='expense')state.accounts.cash-=t.amount;else if(t.type==='income'){state.accounts.cash+=t.amount;state.income+=t.amount;}else if(t.type==='transfer'){state.accounts.cash-=t.amount;state.accounts[t.toAccountId]+=t.amount;}}
function reverseEffect(t){if(t.type==='expense')state.accounts.cash+=t.amount;else if(t.type==='income'){state.accounts.cash-=t.amount;state.income-=t.amount;}else if(t.type==='transfer'){state.accounts.cash+=t.amount;state.accounts[t.toAccountId]-=t.amount;}}
function splitDue(b){return b.status!=='settled' && b.members.some(m=>!m.paid) && (Date.now()-b.createdAt)>=state.settings.splitReminderDays*DAY;}

function statusChip(c){
  if(!c.budget) return '';
  const p=progressOf(c)/c.budget;
  if(c.kind==='transfer') return p>=1?`<span class="okchip">達標 🎉</span>`:'';
  if(p>=1) return `<span class="overchip">超支 ${f(spentOf(c.id)-c.budget)}</span>`;
  if(p>=state.settings.overspendAlertRatio) return `<span class="warnchip">⚠️ 快超支</span>`;
  return '';
}
function barColor(c){
  if(!c.budget) return '#D7DDD6';
  if(c.kind==='transfer') return c.color;
  const p=spentOf(c.id)/c.budget;
  if(p>=1) return 'var(--coral)';
  if(p>=state.settings.overspendAlertRatio) return '#FF8A4C';
  return c.color;
}

/* ---------- HOME ---------- */
function renderHome(){
  const exp=state.cats.filter(c=>c.kind==='expense').map(c=>({label:c.name,color:c.color,value:spentOf(c.id)})).filter(v=>v.value>0);
  const totalExp=exp.reduce((s,x)=>s+x.value,0);
  const moved=totalMoved();
  const leftover=state.income-totalExp-moved;
  const due=state.splits.filter(splitDue).length;
  const hasData=state.transactions.length>0 || state.income>0;

  let pie;
  if(!hasData){
    pie=`<div class="card"><div class="empty"><div class="ee">🌱</div><div class="et">還沒有任何收支紀錄<br>點下方 <b>＋</b> 記第一筆，或在這裡設定本月收入</div>
      <button class="btn ghost" style="margin-top:14px;width:auto;display:inline-block;padding:10px 18px" onclick="openIncome()">設定本月收入</button></div></div>`;
  }else{
    const segs=[...exp];
    if(leftover>0) segs.push({label:'結餘',color:'#D7DDD6',value:leftover});
    const whole=segs.reduce((s,x)=>s+x.value,0)||1;
    const C=2*Math.PI*70; let cum=0;
    const arcs=segs.map(s=>{const fr=s.value/whole,seg=fr*C,off=-cum*C;cum+=fr;return `<circle cx="94" cy="94" r="70" fill="none" stroke="${s.color}" stroke-width="22" stroke-dasharray="${seg.toFixed(2)} ${(C-seg).toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"/>`;}).join('');
    const legend=[...segs].sort((a,b)=>b.value-a.value).slice(0,5).map(s=>`<span class="lg"><span class="dot" style="background:${s.color}"></span>${s.label} <b>${f0(s.value)}</b></span>`).join('');
    pie=`<div class="card donutcard">
      <div class="donutwrap"><svg viewBox="0 0 188 188"><g transform="rotate(-90 94 94)">${arcs||`<circle cx="94" cy="94" r="70" fill="none" stroke="#EFF1ED" stroke-width="22"/>`}</g></svg>
      <div class="ctr"><div class="cv num" style="color:${leftover<0?'var(--coral)':'var(--ink)'}">${f(leftover)}</div><div class="cl">本月結餘</div></div></div>
      ${legend?`<div class="legend">${legend}</div>`:''}
      ${moved>0?`<div class="savednote">🐷 本月已存起 ${f(moved)} 到儲蓄／投資</div>`:''}
    </div>`;
  }

  return `<div class="screen">
    <div class="hi"><div><h1>嗨，${greet()} 👋</h1><div class="sub">${state.month} 月 · 一起變有錢的第 ${dayN()} 天</div></div><div class="avatar logo" onclick="openSettings()"><img src="icon-192.png" alt="萌芽記帳"></div></div>
    ${due>0?`<div class="alert"><span class="ax">⏰</span><span class="at">有 ${due} 筆分帳超過 ${state.settings.splitReminderDays} 天還沒結清，記得催一下！</span></div>`:''}
    <div class="sec-title">🥧 本月收支 <span class="more" data-go="budget">看預算</span></div>
    ${pie}
    <div class="flow">
      <div class="card"><div class="t">📥 收入</div><div class="v num" style="color:var(--jade)">${f(state.income)}</div></div>
      <div class="card"><div class="t">📤 支出</div><div class="v num" style="color:var(--coral)">${f(totalExpense())}</div></div>
      <div class="card"><div class="t">🐷 已存</div><div class="v num">${f(totalMoved())}</div></div>
    </div>
    <div class="sec-title">💎 我的資產</div>
    <div class="card networth" onclick="openAssets()">
      <div class="nwtop"><div><div class="nwt">淨資產</div><div class="nwv num">${f(netWorth())}</div></div><div class="edit">✏️ 編輯</div></div>
      <div class="nwsplit">
        <div><div class="t">現金</div><div class="v num">${f0(state.accounts.cash)}</div></div>
        <div><div class="t">儲蓄</div><div class="v num">${f0(state.accounts.savings)}</div></div>
        <div><div class="t">投資</div><div class="v num">${f0(state.accounts.investment)}</div></div>
      </div>
    </div>
    <div class="sec-title">🧾 最近紀錄 <span class="more" data-go="ledger">看全部</span></div>
    ${state.transactions.length?`<div class="card">${state.transactions.slice(0,5).map((t,i)=>txRow(t,i)).join('')}</div>`
      :`<div class="card"><div class="empty"><div class="ee">📝</div><div class="et">還沒有紀錄，記一筆就會出現在這</div></div></div>`}
  </div>`;
}
function txRow(t,i){
  const col=t.type==='income'?'var(--jade)':t.type==='transfer'?'var(--ink-soft)':'var(--coral)';
  const sign=t.type==='income'?'+':t.type==='transfer'?'→':'−';
  const bg=t.type==='income'?'var(--jade-soft)':t.type==='transfer'?'#EEF1EC':'#F4F2EC';
  const when=t.date?timeLabel(t.date):(t.t||'');
  return `<div class="mem" style="border-top:1px solid var(--line);cursor:pointer" onclick="openEditTx(${i})">
    <div class="ma" style="background:${bg};border-radius:11px;width:38px;height:38px;font-size:18px">${t.e}</div>
    <div><div class="mn">${t.n}</div><div class="bd">${when}</div></div>
    <div class="ms" style="margin-right:0;color:${col}">${sign}${f0(t.amount)}</div></div>`;
}

/* ---------- BUDGET ---------- */
function renderBudget(){
  const used=totalExpense()+totalMoved();
  const usedPct=state.income>0?Math.min(used/state.income,1)*100:0;
  const alloc=allocated(), unalloc=state.income-alloc;
  return `<div class="screen">
    <div class="hi"><div><h1>本月預算 💳</h1><div class="sub">拉滑桿分配每一塊錢的工作</div></div><div class="avatar" onclick="openSettings()">📐</div></div>
    <div class="card" style="background:linear-gradient(150deg,#FFFDF7,#FFF7E8);border-color:#FFE9BD;cursor:pointer" onclick="openIncome()">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><div style="font-size:12px;color:var(--ink-soft)">總預算（本月收入）✏️</div>
        <div class="num" style="font-family:var(--font-num);font-weight:700;font-size:26px">${f(state.income)}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--ink-soft)">已使用</div>
        <div class="num" style="font-weight:600;color:${usedPct>=85?'var(--coral)':'var(--jade-deep)'}">${usedPct.toFixed(0)}%</div></div>
      </div>
      <div class="bar lg" style="margin-top:12px"><i style="width:${usedPct}%;background:${usedPct>=85?'var(--coral)':'var(--jade)'}"></i></div>
      <div id="budsum" style="display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px">${budSumHTML()}</div>
    </div>
    <div class="sec-title">🎚️ 各分類預算</div>
    <div class="card">
      ${state.cats.map((c,i)=>{if(c.kind==='expense'&&c.special==='unknown_loss')return '';const prog=progressOf(c);const p=c.budget?Math.min(prog/c.budget,1)*100:0;const isT=c.kind==='transfer';return `<div class="alloc">
        <div class="ic" style="background:${tint(c.color,.15)}">${c.emoji}</div>

function budSumHTML(){

/* ---------- ADD (支出 / 收入 / 存錢) ---------- */
function renderAdd(){
  const mode=ui.type;
  let list,selId;
  if(mode==='expense'){list=state.cats.filter(c=>c.kind==='expense');selId=ui.cid;}
  else if(mode==='income'){list=state.incomeCats.map(c=>({id:c.id,emoji:c.e,name:c.n}));selId=ui.incomeCid;}
  else {list=state.cats.filter(c=>c.kind==='transfer').map(c=>({id:c.id,emoji:c.emoji,name:c.name}));selId=ui.saveCid;}
  const sel=list.find(c=>c.id===selId)||list[0];
  const a=ui.amount, disp=a===''?'0':(a.endsWith('.')?a:(+a).toLocaleString());
  const lbl=mode==='expense'?(sel?sel.name:'')+' 支出':mode==='income'?(sel?sel.name:'')+' 收入':'存入 '+(sel?sel.name:'');
  const btn=mode==='expense'?'記下這筆':mode==='income'?'收入入帳':'存進去 💪';
  return `<div class="screen addscreen">
    <div class="seg">
      <button class="${mode==='expense'?'on':''}" onclick="setType('expense')">− 支出</button>
      <button class="${mode==='income'?'on':''}" onclick="setType('income')">＋ 收入</button>
      <button class="${mode==='save'?'on':''}" onclick="setType('save')">🐷 存錢</button>
    </div>
    <div class="amount-display"><div class="lbl">${lbl}</div><div class="big num ${mode==='income'?'inc':''}"><small>$</small>${disp}</div></div>
    <div class="chips">
      ${list.map(c=>`<div class="chip ${c.id===selId?'on':''}" onclick="pickCat('${c.id}')"><span class="e">${c.emoji}</span><span class="n">${c.name}</span></div>`).join('')}
      ${mode==='expense'?`<div class="chip add" onclick="openAddCat()"><span class="e">＋</span><span class="n">自訂</span></div>`:''}
    </div>
    <input class="note-in" placeholder="加個備註（選填）…" value="${ui.note}" oninput="ui.note=this.value">
    <div class="daterow"><span class="dl">📅 日期</span><input type="date" value="${ui.date}" onchange="ui.date=this.value"></div>
    <div class="addbottom">
      <button class="btn" onclick="saveTx()">完成 · ${btn}</button>
      <div class="keypad">${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k=>`<div class="key" onclick="press('${k}')">${k}</div>`).join('')}</div>
    </div>
  </div>`;
}
function setType(t){ui.type=t;ui.amount='';rerender();}
function pickCat(id){if(ui.type==='expense')ui.cid=id;else if(ui.type==='income')ui.incomeCid=id;else ui.saveCid=id;rerender();}
function press(k){let a=ui.amount;if(k==='⌫')a=a.slice(0,-1);else if(k==='.'){if(!a.includes('.')&&a!=='')a+='.';}else{if(a.replace('.','').length<7)a+=k;}ui.amount=a;const el=document.querySelector('.amount-display .big');if(el)el.innerHTML='<small>$</small>'+(a===''?'0':(a.endsWith('.')?a:(+a).toLocaleString()));}
function saveTx(){
  const amt=+ui.amount;
  if(!amt){toast('先輸入金額喔 😉');return;}
  const ts=inputToTs(ui.date);
  if(ui.type==='expense'){
    const c=catById(ui.cid);
    state.transactions.unshift({type:'expense',amount:amt,categoryId:c.id,e:c.emoji,n:ui.note||c.name,note:ui.note,date:ts});
    state.accounts.cash-=amt;
    const pp=c.budget?spentOf(c.id)/c.budget:0;
    toast(c.budget&&pp>=1?`記好了！${c.name}已超支 😅`:c.budget&&pp>=state.settings.overspendAlertRatio?`記好了！${c.name}快用完了 ⚠️`:'記好了 ✅');
  }else if(ui.type==='income'){
    const s=state.incomeCats.find(x=>x.id===ui.incomeCid);
    state.transactions.unshift({type:'income',amount:amt,categoryId:s.id,e:s.e,n:ui.note||s.n,note:ui.note,date:ts});
    state.accounts.cash+=amt; state.income+=amt;
    toast(`收入入帳 +${f0(amt)} 🤑`);
  }else{
    const c=catById(ui.saveCid);
    state.transactions.unshift({type:'transfer',amount:amt,categoryId:c.id,toAccountId:c.acc,fromAccountId:'cash',e:c.emoji,n:'存入'+c.name+(ui.note?' · '+ui.note:''),note:ui.note,date:ts});
    state.accounts.cash-=amt; state.accounts[c.acc]+=amt;
    toast(`已存入${c.name} ${f0(amt)} 🌱`);
  }
  ui.amount='';ui.note='';
  // keep ui.date for fast multiple entries on same day; reset to today on next open
  save(); go('home');
}

/* ---------- edit / delete a transaction ---------- */
let editTxIdx=-1, editTxState=null;
function openEditTx(idx){const t=state.transactions[idx];editTxIdx=idx;

function editTxSheet(){const et=editTxState;
  let list,selId;
  if(et.type==='expense'){list=state.cats.filter(c=>c.kind==='expense');selId=et.cid;}
  else if(et.type==='income'){list=state.incomeCats.map(c=>({id:c.id,emoji:c.e,name:c.n}));selId=et.cid;}
  else {list=state.cats.filter(c=>c.kind==='transfer').map(c=>({id:c.id,emoji:c.emoji,name:c.name}));selId=et.cid;}
  const tl=et.type==='expense'?'支出':et.type==='income'?'收入':'存錢';
  sheet(`<h3>編輯這筆 ${tl} ✏️</h3>
    <div class="fieldrow"><div class="fe" style="background:var(--jade-soft)">💲</div><div class="fl">金額</div><input type="number" inputmode="numeric" value="${et.amount}" oninput="editTxState.amount=this.value"></div>

    <div class="fld">日期</div>
    <input class="note-in" type="date" value="${et.date}" onchange="editTxState.date=this.value">
    <div class="fld">備註</div>
    <input class="note-in" placeholder="備註（選填）" value="${et.note}" oninput="editTxState.note=this.value">
    <button class="btn" style="margin-top:16px" onclick="saveEditTx()">儲存變更</button>
    <button class="btn danger" style="margin-top:10px" onclick="deleteEditTx()">🗑 刪除這筆</button>`);}
function editTxPick(id){editTxState.cid=id;editTxSheet();}
function saveEditTx(){const et=editTxState;const amt=Math.max(+et.amount||0,0);if(!amt){toast('金額要大於 0 😉');return;}
  const t=state.transactions[editTxIdx];
  reverseEffect(t);
  t.amount=amt;t.categoryId=et.cid;t.note=et.note;t.date=inputToTs(et.date);
  if(t.type==='expense'){const c=catById(et.cid);t.e=c.emoji;t.n=et.note||c.name;}
  else if(t.type==='income'){const s=state.incomeCats.find(x=>x.id===et.cid);t.e=s.e;t.n=et.note||s.n;}
  else{const c=catById(et.cid);t.toAccountId=c.acc;t.e=c.emoji;t.n='存入'+c.name+(et.note?' · '+et.note:'');}
  applyEffect(t);
  closeSheet();save();toast('已更新 ✅');rerender();}
function deleteEditTx(){const t=state.transactions[editTxIdx];
  sheet(`<h3>刪除這筆紀錄？ ⚠️</h3><p>「${t.n}」${f(t.amount)} 會被刪除，餘額也會一併還原。此動作無法復原。</p>
    <button class="btn danger" onclick="doDeleteTx()">確定刪除</button>
    <button class="btn ghost" style="margin-top:10px" onclick="editTxSheet()">取消</button>`);}
function doDeleteTx(){const t=state.transactions[editTxIdx];reverseEffect(t);state.transactions.splice(editTxIdx,1);closeSheet();save();toast('已刪除這筆');rerender();}

function renderSplit(){

function togglePaid(bi,mi){const m=state.splits[bi].members[mi];m.paid=!m.paid;m.paidAt=m.paid?Date.now():null;const b=state.splits[bi];if(b.members.every(x=>x.paid)){b.status='settled';b.settledAt=Date.now();}else{b.status='open';b.settledAt=null;}toast(m.paid?`${m.name} 標記為已付款 ✅`:`${m.name} 改回未付款`);save();rerender();}

let editBill=null;
function openEditBill(bi){const b=state.splits[bi];
  editBill={idx:bi,title:b.title,total:String(b.total),e:b.e,payer:b.payer,
    members:b.members.map(m=>({name:m.name,share:m.share,paid:m.paid,paidAt:m.paidAt||null})),newName:''};
  editBillSheet();}
function ebPayerShare(){const total=+editBill.total||0;const others=editBill.members.filter(m=>m.name!==editBill.payer).reduce((s,m)=>s+(+m.share||0),0);return total-others;}
function editBillSheet(){const eb=editBill;const em=['🍽️','🍶','🏖️','🎬','🚕','🏠','🎁'];const ps=ebPayerShare();
  sheet(`<h3>編輯分帳 ✏️</h3><p>可改每個人的金額（例如收整數），湊不齊的零頭由墊款人吸收。</p>
    <input class="note-in" placeholder="名稱" value="${eb.title}" oninput="editBill.title=this.value">
    <input class="note-in" type="number" inputmode="numeric" placeholder="總金額" style="margin-top:10px" value="${eb.total}" oninput="setEbTotal(this.value)">
    <div class="emoji-pick">${em.map(e=>`<span class="${e===eb.e?'on':''}" onclick="editBill.e='${e}';editBillSheet()">${e}</span>`).join('')}</div>
    <div class="fld">每個人的金額</div>
    ${eb.members.map((m,mi)=>{const isP=m.name===eb.payer;return `<div class="fieldrow">
      <div class="fe ${isP?'':''}" style="background:${isP?'var(--butter-soft)':'#EEF1EC'};font-size:13px;font-weight:700;color:var(--ink-soft)">${m.name[0]}</div>
      <div class="fl">${m.name}${isP?' <span style="color:var(--ink-faint);font-weight:500;font-size:11px">墊款人·自動</span>':''} ${m.name!=='我'?`<span style="color:var(--coral);font-weight:500;font-size:11px;margin-left:4px;cursor:pointer" onclick="removeEbMember(${mi})">移除</span>`:''}</div>
      ${isP?`<input id="eb-payershare" value="${ps}" readonly style="background:#F5F7F2;color:var(--ink-soft)">`:`<input type="number" inputmode="numeric" value="${m.share}" oninput="setEbShare(${mi},this.value)">`}
    </div>`}).join('')}
    <div style="display:flex;gap:8px;margin-top:4px"><input class="note-in" placeholder="新增參與者名字" value="${eb.newName}" oninput="editBill.newName=this.value" style="flex:1"><button class="btn ghost" style="width:auto;padding:12px 18px" onclick="addEbMember()">加入</button></div>
    <div id="eb-diff" style="text-align:center;font-size:12px;margin-top:12px;font-weight:600;color:${ps<0?'var(--coral)':'var(--jade-deep)'}">${ps<0?'⚠️ 其他人金額已超過總額，請調低':'墊款人應付 '+f(ps)+'（含零頭）'}</div>
    <div class="fld">誰先墊錢？</div>
    <div class="pillrow">${eb.members.map((m,mi)=>`<div class="pill ${m.name===eb.payer?'on':''}" onclick="setEbPayer(${mi})">${m.name}</div>`).join('')}</div>
    <button class="btn" style="margin-top:18px" onclick="saveEditBill()">儲存變更</button>
    <button class="btn danger" style="margin-top:10px" onclick="deleteEditBill()">🗑 刪除這筆分帳</button>`);}
function setEbTotal(v){editBill.total=v;refreshEbDerived();}
function setEbShare(mi,v){editBill.members[mi].share=Math.max(+v||0,0);refreshEbDerived();}
function refreshEbDerived(){const ps=ebPayerShare();const el=document.getElementById('eb-payershare');if(el)el.value=ps;const d=document.getElementById('eb-diff');if(d){d.textContent=ps<0?'⚠️ 其他人金額已超過總額，請調低':'墊款人應付 '+f(ps)+'（含零頭）';d.style.color=ps<0?'var(--coral)':'var(--jade-deep)';}}
function setEbPayer(mi){editBill.payer=editBill.members[mi].name;editBillSheet();}
function addEbMember(){const n=(editBill.newName||'').trim();if(!n){toast('輸入名字 🙂');return;}if(editBill.members.some(m=>m.name===n)){toast('已經有這個人了');return;}editBill.members.push({name:n,share:0,paid:false,paidAt:null});editBill.newName='';editBillSheet();}
function removeEbMember(mi){const m=editBill.members[mi];if(m.name==='我'){toast('自己不能移除 🙂');return;}editBill.members.splice(mi,1);if(editBill.payer===m.name)editBill.payer=editBill.members[0].name;editBillSheet();}
function saveEditBill(){const eb=editBill;const total=+eb.total;
  if(!eb.title.trim()||!total){toast('名稱跟金額都要填喔 😉');return;}
  if(eb.members.length<2){toast('至少要有兩個人分 🙂');return;}
  const ps=ebPayerShare();if(ps<0){toast('其他人金額超過總額了，請調低');return;}
  const members=eb.members.map(m=>m.name===eb.payer?{name:m.name,share:ps,paid:true,paidAt:m.paidAt||Date.now()}:{name:m.name,share:+m.share||0,paid:m.paid,paidAt:m.paidAt||null});
  const b=state.splits[eb.idx];

/* ---------- plumbing ---------- */
function sheet(html){document.getElementById('sheet').innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay'&&ui.dismissable)closeSheet();});
let toastTimer;function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
const screens={home:renderHome,budget:renderBudget,add:renderAdd,goals:renderGoals,split:renderSplit,ledger:renderLedger};
function ensureLedgerDefaults(){const now=new Date();const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  if(!ui.ledgerDay)ui.ledgerDay=tsToInput(now.getTime());
  if(!ui.ledgerMonth)ui.ledgerMonth=ym;
  if(!ui.ledgerYear)ui.ledgerYear=now.getFullYear();
  if(!ui.ledgerFrom)ui.ledgerFrom=ym+'-01';
  if(!ui.ledgerTo)ui.ledgerTo=tsToInput(now.getTime());}
function renderLedger(){
  ensureLedgerDefaults();
  const cats=[...state.cats.map(c=>({id:c.id,name:c.name})),...state.incomeCats.map(c=>({id:c.id,name:c.n}))];
  const tl={all:'全部',expense:'支出',income:'收入',transfer:'存錢'};
  const rl={all:'全部',day:'日',month:'月',year:'年',custom:'自訂'};
  const R=ui.ledgerRange;
  let nav='';
  if(R==='day') nav=`<div class="rangenav"><button onclick="ledgerShiftDay(-1)">‹</button><input type="date" value="${ui.ledgerDay}" onchange="ui.ledgerDay=this.value;rerender()"><button onclick="ledgerShiftDay(1)">›</button></div>`;
  else if(R==='month') nav=`<div class="rangenav"><button onclick="ledgerShiftMonth(-1)">‹</button><input type="month" value="${ui.ledgerMonth}" onchange="ui.ledgerMonth=this.value;rerender()"><button onclick="ledgerShiftMonth(1)">›</button></div>`;
  else if(R==='year') nav=`<div class="rangenav"><button onclick="ledgerShiftYear(-1)">‹</button><div class="ryear">${ui.ledgerYear} 年</div><button onclick="ledgerShiftYear(1)">›</button></div>`;
  else if(R==='custom') nav=`<div class="customrange"><input type="date" value="${ui.ledgerFrom}" onchange="ui.ledgerFrom=this.value;rerender()"><span>～</span><input type="date" value="${ui.ledgerTo}" onchange="ui.ledgerTo=this.value;rerender()"></div>`;
  return `<div class="screen">
    <div class="hi"><div style="display:flex;align-items:center;gap:11px"><button class="backbtn" onclick="go('home')">←</button><div><h1>帳本</h1><div class="sub">所有收支紀錄</div></div></div></div>
    <div class="fld" style="margin:6px 2px 7px">期間</div>
    <div class="seg">${['all','day','month','year','custom'].map(r=>`<button class="${R===r?'on':''}" onclick="setLedgerRange('${r}')">${rl[r]}</button>`).join('')}</div>
    ${nav}
    <div class="fld" style="margin:14px 2px 7px">類型</div>
    <div class="seg">${['all','expense','income','transfer'].map(t=>`<button class="${ui.ledgerType===t?'on':''}" onclick="setLedgerType('${t}')">${tl[t]}</button>`).join('')}</div>
    <select class="note-in" style="margin-top:10px" onchange="ui.ledgerCat=this.value;rerender()">
      <option value="all" ${ui.ledgerCat==='all'?'selected':''}>全部分類</option>
      ${cats.map(c=>`<option value="${c.id}" ${ui.ledgerCat===c.id?'selected':''}>${c.name}</option>`).join('')}
    </select>
    <input class="note-in" style="margin-top:10px" placeholder="🔍 搜尋備註…" value="${ui.ledgerSearch||''}" oninput="ui.ledgerSearch=this.value;updateLedgerList()">
    <div id="ledgerlist" style="margin-top:16px">${buildLedgerList()}</div>
  </div>`;
}
function buildLedgerList(){
  ensureLedgerDefaults();
  let pairs=state.transactions.map((tx,idx)=>({tx,idx}));
  const R=ui.ledgerRange;
  if(R!=='all') pairs=pairs.filter(p=>{const ds=tsToInput(p.tx.date||0);const d=new Date(p.tx.date||0);
    if(R==='day')return ds===ui.ledgerDay;
    if(R==='month')return ds.slice(0,7)===ui.ledgerMonth;
    if(R==='year')return d.getFullYear()===ui.ledgerYear;
    if(R==='custom')return ds>=ui.ledgerFrom&&ds<=ui.ledgerTo;
    return true;});
  if(ui.ledgerType!=='all') pairs=pairs.filter(p=>p.tx.type===ui.ledgerType);
  if(ui.ledgerCat!=='all') pairs=pairs.filter(p=>p.tx.categoryId===ui.ledgerCat);
  const q=(ui.ledgerSearch||'').trim();
  if(q) pairs=pairs.filter(p=>(p.tx.n||'').indexOf(q)>=0||(p.tx.note||'').indexOf(q)>=0);
  pairs.sort((a,b)=>(b.tx.date||0)-(a.tx.date||0));
  if(!pairs.length) return `<div class="card"><div class="empty"><div class="ee">🔍</div><div class="et">${state.transactions.length?'這個範圍沒有紀錄':'還沒有任何紀錄'}</div></div></div>`;
  const totExp=pairs.filter(p=>p.tx.type==='expense').reduce((s,p)=>s+p.tx.amount,0);
  const totInc=pairs.filter(p=>p.tx.type==='income').reduce((s,p)=>s+p.tx.amount,0);
  const summary=`<div class="card rangesum">
    <div><div class="t">支出</div><div class="v num" style="color:var(--coral)">${f0(totExp)}</div></div>
    <div><div class="t">收入</div><div class="v num" style="color:var(--jade)">${f0(totInc)}</div></div>
    <div><div class="t">結餘</div><div class="v num">${f0(totInc-totExp)}</div></div>
  </div>`;
  const groups={}, order=[];
  pairs.forEach(p=>{const d=new Date(p.tx.date||0);const key=`${d.getFullYear()}年${d.getMonth()+1}月`;if(!groups[key]){groups[key]=[];order.push(key);}groups[key].push(p);});
  const body=order.map(key=>{
    const arr=groups[key];
    const exp=arr.filter(p=>p.tx.type==='expense').reduce((s,p)=>s+p.tx.amount,0);
    const inc=arr.filter(p=>p.tx.type==='income').reduce((s,p)=>s+p.tx.amount,0);
    const sum=[exp?'支出 '+f0(exp):'',inc?'收入 '+f0(inc):''].filter(Boolean).join(' · ')||(arr.length+' 筆');
    return `<div class="mgroup"><div class="mhead"><span>${key}</span><span class="msum">${sum}</span></div>
      <div class="card" style="padding:4px 16px">${arr.map(p=>txRow(p.tx,p.idx)).join('')}</div></div>`;
  }).join('');
  return summary+body;
}
function setLedgerType(t){ui.ledgerType=t;rerender();}
function setLedgerRange(r){ui.ledgerRange=r;rerender();}
function ledgerShiftDay(n){const dt=new Date(ui.ledgerDay+'T12:00:00');dt.setDate(dt.getDate()+n);ui.ledgerDay=tsToInput(dt.getTime());rerender();}
function ledgerShiftMonth(n){const [y,m]=ui.ledgerMonth.split('-').map(Number);const dt=new Date(y,m-1+n,1);ui.ledgerMonth=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;rerender();}
function ledgerShiftYear(n){ui.ledgerYear=ui.ledgerYear+n;rerender();}
function updateLedgerList(){const el=document.getElementById('ledgerlist');if(el)el.innerHTML=buildLedgerList();}
function rerender(){document.getElementById('view').innerHTML=screens[ui.current]();}
function go(name){ui.current=name;if(name==='add')ui.date=todayStr();const hl=name==='ledger'?'home':name;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.go===hl));document.getElementById('view').classList.toggle('noscroll',name==='add');rerender();document.getElementById('view').scrollTop=0;}
document.getElementById('tabbar').addEventListener('click',e=>{const t=e.target.closest('[data-go]');if(t)go(t.dataset.go);});
document.getElementById('view').addEventListener('click',e=>{const m=e.target.closest('[data-go]');if(m)go(m.dataset.go);});

CLOUD=initCloud();
if(CLOUD){
  showGate(true);
  auth.getRedirectResult().catch(function(){});
  auth.onAuthStateChanged(function(user){
    if(user){ startWithUser(user); }
    else { cloudUser=null; showGate(true); }
  });
}else{
  load();
  migrateCats();
  go('home');
  if(!state.meta.onboarded) openOnboarding();
}
</script>
