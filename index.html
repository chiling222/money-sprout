<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#10A567">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="萌芽記帳">
<title>萌芽記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FCFBF7;
  --card:#FFFFFF;
  --ink:#15231C;
  --ink-soft:#67746B;
  --ink-faint:#9AA69E;
  --line:#EDEFEA;
  --jade:#10A567;
  --jade-deep:#0A7A4D;
  --jade-soft:#E2F4EB;
  --coral:#FF5A3C;
  --coral-soft:#FFE7E1;
  --butter:#FFB72B;
  --butter-soft:#FFF1D4;
  --shadow-sm:0 8px 20px -12px rgba(20,50,35,.25);
  --font-num:'Fredoka','PingFang TC','Microsoft JhengHei',system-ui,sans-serif;
  --font-body:'PingFang TC','Noto Sans TC','Microsoft JhengHei',system-ui,sans-serif;
  --nav-h:74px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font-body);color:var(--ink);
  background:
    radial-gradient(900px 500px at 15% -8%, #F4E8D4 0%, transparent 55%),
    radial-gradient(700px 600px at 110% 25%, #DFF0E5 0%, transparent 50%),
    #E7EFE9;
  overscroll-behavior:none;
}
#app{
  position:relative;
  width:100%;max-width:480px;margin:0 auto;
  height:100dvh;height:100svh;
  background:var(--paper);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 60px -20px rgba(20,50,35,.25);
}

/* ---- scroll view ---- */
.view{
  flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:calc(env(safe-area-inset-top) + 10px) 18px calc(var(--nav-h) + env(safe-area-inset-bottom) + 24px);
  scroll-behavior:smooth;
}
.view::-webkit-scrollbar{display:none}
.screen{animation:rise .42s cubic-bezier(.2,.8,.25,1)}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

.hi{display:flex;align-items:center;justify-content:space-between;padding:8px 4px 14px}
.hi h1{font-family:var(--font-num);font-weight:600;font-size:22px}
.hi .sub{color:var(--ink-soft);font-size:13px;margin-top:2px}
.avatar{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFD98A,#FF9F43);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow-sm)}

.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}
.card{background:var(--card);border-radius:24px;padding:18px;box-shadow:var(--shadow-sm);border:1px solid var(--line)}
.sec-title{font-family:var(--font-num);font-weight:600;font-size:15px;margin:22px 4px 12px;display:flex;align-items:center;gap:7px}
.sec-title .more{margin-left:auto;font-family:var(--font-body);font-weight:500;font-size:12px;color:var(--jade);background:var(--jade-soft);padding:4px 11px;border-radius:20px;cursor:pointer}

/* ---- hero net worth ---- */
.hero{background:linear-gradient(150deg,#13b977 0%,#0c8a55 100%);border-radius:28px;padding:22px 22px 20px;color:#fff;position:relative;overflow:hidden;box-shadow:0 20px 36px -18px rgba(12,138,85,.7)}
.hero::after{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.09);top:-90px;right:-50px}
.hero::before{content:"🌱";position:absolute;font-size:120px;bottom:-34px;right:-10px;opacity:.16;transform:rotate(-12deg)}
.hero .lab{font-size:12.5px;opacity:.85;display:flex;align-items:center;gap:6px}
.hero .big{font-family:var(--font-num);font-weight:700;font-size:40px;letter-spacing:-.5px;margin-top:4px;line-height:1}
.hero .chg{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;margin-top:12px}
.hero .split{display:flex;gap:8px;margin-top:16px;position:relative;z-index:2}
.hero .split div{flex:1;background:rgba(255,255,255,.13);border-radius:14px;padding:9px 11px}
.hero .split .t{font-size:11px;opacity:.82}
.hero .split .v{font-family:var(--font-num);font-weight:600;font-size:15px;margin-top:3px}

.flow{display:flex;gap:10px;margin-top:14px}
.flow .card{flex:1;padding:15px 13px;text-align:left}
.flow .t{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px}
.flow .v{font-family:var(--font-num);font-weight:600;font-size:18px;margin-top:5px}

.bar{height:9px;border-radius:8px;background:#EFF1ED;overflow:hidden;position:relative}
.bar>i{display:block;height:100%;border-radius:8px;transition:width .7s cubic-bezier(.2,.8,.25,1)}
.bar.lg{height:12px}

.cat{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--line)}
.cat:last-child{border-bottom:none}
.cat .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat .mid{flex:1;min-width:0}
.cat .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.cat .nm{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px}
.cat .amt{font-family:var(--font-num);font-size:12.5px;color:var(--ink-soft)}
.cat .amt b{color:var(--ink);font-weight:600}
.warnchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--coral-soft);color:var(--coral);animation:pulse 1.4s ease-in-out infinite}
.overchip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--coral);color:#fff}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.65;transform:scale(.96)}}

.alloc{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.alloc:last-child{border-bottom:none}
.alloc .ic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alloc .mid{flex:1;min-width:0}
.alloc .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.alloc .nm{font-weight:600;font-size:13.5px}
.alloc .val{font-family:var(--font-num);font-weight:600;font-size:14px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:7px;border-radius:8px;background:#EFF1ED;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--jade);cursor:pointer;box-shadow:0 3px 8px rgba(0,0,0,.18)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#fff;border:4px solid var(--jade);cursor:pointer}

.amount-display{text-align:center;padding:26px 0 8px}
.amount-display .lbl{font-size:12.5px;color:var(--ink-soft)}
.amount-display .big{font-family:var(--font-num);font-weight:700;font-size:48px;letter-spacing:-1px;margin-top:6px}
.amount-display .big small{font-size:26px;color:var(--ink-faint);margin-right:4px}
.chips{display:flex;gap:9px;overflow-x:auto;padding:6px 2px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;width:66px;border-radius:16px;background:var(--card);border:1.5px solid var(--line);cursor:pointer;transition:.18s}
.chip .e{font-size:22px}
.chip .n{font-size:11px;font-weight:600;color:var(--ink-soft)}
.chip.on{border-color:var(--jade);background:var(--jade-soft);transform:translateY(-2px)}
.chip.on .n{color:var(--jade-deep)}
.chip.add{border-style:dashed;color:var(--ink-faint)}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.key{padding:18px 0;border-radius:16px;background:var(--card);border:1px solid var(--line);font-family:var(--font-num);font-weight:600;font-size:23px;text-align:center;cursor:pointer;transition:.1s;user-select:none}
.key:active{transform:scale(.93);background:var(--jade-soft)}
.note-in{width:100%;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:13px 14px;font-family:var(--font-body);font-size:16px;margin-top:6px}
.note-in:focus{outline:none;border-color:var(--jade)}
.btn{display:block;width:100%;border:none;background:var(--jade);color:#fff;font-family:var(--font-num);font-weight:600;font-size:16px;padding:16px;border-radius:18px;cursor:pointer;margin-top:12px;box-shadow:0 12px 22px -10px rgba(16,165,103,.8);transition:.15s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--jade-soft);color:var(--jade-deep);box-shadow:none}

.goal{position:relative;overflow:hidden}
.goal .head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.goal .ge{width:46px;height:46px;border-radius:14px;background:var(--jade-soft);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.goal .gt{font-weight:700;font-size:15.5px}
.goal .gd{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
.goal .gright{margin-left:auto;text-align:right}
.goal .gright .p{font-family:var(--font-num);font-weight:700;font-size:18px;color:var(--jade)}
.goal .grow{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-top:10px}
.goal .grow b{font-family:var(--font-num);color:var(--ink)}
.goal.done{background:linear-gradient(150deg,#FFF6E0,#FFFDF6);border-color:#FFE3A8}
.ribbon{position:absolute;top:13px;right:-30px;transform:rotate(38deg);background:var(--butter);color:#5a3c00;font-weight:700;font-size:10px;padding:3px 34px;font-family:var(--font-num)}
.badges{display:flex;gap:10px;flex-wrap:wrap}
.badge{flex:0 0 calc(33.33% - 7px);text-align:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 6px}
.badge .bi{font-size:30px}
.badge.lock .bi{filter:grayscale(1);opacity:.32}
.badge .bn{font-size:11px;font-weight:600;margin-top:7px;color:var(--ink)}
.badge.lock .bn{color:var(--ink-faint)}

.score-card{text-align:center;background:linear-gradient(150deg,#16b87a,#0b7a4e);color:#fff;border-radius:28px;padding:24px;position:relative;overflow:hidden}
.score-card::before{content:"📋";position:absolute;font-size:110px;right:-20px;top:-20px;opacity:.13;transform:rotate(12deg)}
.score-ring{width:128px;height:128px;margin:6px auto 0;position:relative}
.score-ring .gr{font-family:var(--font-num);font-weight:700;font-size:42px;line-height:1}
.score-ring .gl{font-size:11px;opacity:.85;margin-top:2px}
.score-ring .ringcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-card .verdict{font-family:var(--font-num);font-weight:600;font-size:17px;margin-top:14px}
.score-card .sub{font-size:12.5px;opacity:.88;margin-top:5px;line-height:1.5}
.advice{display:flex;gap:12px;padding:15px;border-radius:18px;background:var(--card);border:1px solid var(--line);margin-top:11px}
.advice .ae{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.advice .ah{font-weight:700;font-size:13.5px;margin-bottom:3px}
.advice .ap{font-size:12.5px;color:var(--ink-soft);line-height:1.55}

.tx{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
.tx:last-child{border:none}
.tx .te{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.tx .tn{font-weight:600;font-size:13.5px}
.tx .td{font-size:11px;color:var(--ink-faint);margin-top:1px}
.tx .tv{margin-left:auto;font-family:var(--font-num);font-weight:600;font-size:15px;color:var(--coral)}
.tx .tv.in{color:var(--jade)}

/* tab bar */
.tabbar{position:absolute;bottom:0;left:0;right:0;background:rgba(252,251,247,.94);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;align-items:flex-start;justify-content:space-around;padding:10px 14px calc(env(safe-area-inset-bottom) + 8px);z-index:50}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;font-weight:600;color:var(--ink-faint);cursor:pointer;width:56px;transition:.15s}
.tab svg{width:24px;height:24px;stroke:var(--ink-faint);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tab.on{color:var(--jade-deep)}
.tab.on svg{stroke:var(--jade)}
.fab{width:58px;height:58px;border-radius:20px;background:linear-gradient(150deg,#16b87a,#0b8a55);margin-top:-16px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 24px -8px rgba(11,138,85,.9);cursor:pointer;transition:.15s}
.fab:active{transform:scale(.93)}
.fab svg{width:28px;height:28px;stroke:#fff;stroke-width:2.6;fill:none;stroke-linecap:round}

.toast{position:absolute;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 18px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.35s;z-index:90;white-space:nowrap;box-shadow:var(--shadow-sm)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:absolute;inset:0;background:rgba(20,35,28,.4);backdrop-filter:blur(2px);display:flex;align-items:flex-end;z-index:80;opacity:0;pointer-events:none;transition:.25s}
.overlay.show{opacity:1;pointer-events:auto}
.sheet{background:var(--paper);width:100%;border-radius:28px 28px 0 0;padding:22px 22px calc(env(safe-area-inset-bottom) + 28px);transform:translateY(100%);transition:.32s cubic-bezier(.2,.8,.25,1)}
.overlay.show .sheet{transform:none}
.sheet h3{font-family:var(--font-num);font-weight:600;font-size:18px;margin-bottom:4px}
.sheet p{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px}
.emoji-pick{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0 4px}
.emoji-pick span{width:44px;height:44px;border-radius:13px;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer}
.emoji-pick span.on{border-color:var(--jade);background:var(--jade-soft)}

@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <div class="view" id="view"></div>
  <div class="toast" id="toast"></div>
  <div class="overlay" id="overlay"><div class="sheet" id="sheet"></div></div>
  <nav class="tabbar" id="tabbar">
    <div class="tab on" data-go="home"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>首頁</div>
    <div class="tab" data-go="budget"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><rect x="7" y="11" width="3" height="8" rx="1"/><rect x="12" y="7" width="3" height="12" rx="1"/><rect x="17" y="14" width="3" height="5" rx="1"/></svg>預算</div>
    <div class="fab" data-go="add"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></div>
    <div class="tab" data-go="goals"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/></svg>目標</div>
    <div class="tab" data-go="health"><svg viewBox="0 0 24 24"><path d="M3 12h4l2 6 4-13 2 7h6"/></svg>健檢</div>
  </nav>
</div>

<script>
const state = {
  month: 6, year: 2026, income: 35000,
  cats: [
    {id:'food',  n:'日常餐飲', e:'🍱', c:'#FF9F43', budget:6000, spent:5200},
    {id:'feast', n:'大餐',     e:'🍣', c:'#FF6B6B', budget:2000, spent:1800},
    {id:'trans', n:'交通',     e:'🚌', c:'#3FA9F5', budget:1500, spent:980},
    {id:'fun',   n:'娛樂',     e:'🎮', c:'#9B7EDE', budget:2000, spent:2200},
    {id:'shop',  n:'購物',     e:'🛍️', c:'#F783AC', budget:3000, spent:2750},
    {id:'sub',   n:'訂閱',     e:'📺', c:'#20C997', budget:800,  spent:760},
    {id:'invest',n:'投資',     e:'📈', c:'#10A567', budget:5000, spent:5000},
    {id:'save',  n:'儲蓄',     e:'🐷', c:'#FFB72B', budget:6000, spent:6000},
  ],
  assets:{ cash:28000, savings:85000, invest:142000 },
  goals:[
    {n:'日本賞楓',   e:'✈️', target:60000,  saved:38000, date:'2026/12'},
    {n:'新筆電',     e:'💻', target:40000,  saved:40000, date:'2026/08'},
    {n:'緊急預備金', e:'🛟', target:100000, saved:52000, date:'2027/06'},
  ],
  tx:[
    {e:'🍱',n:'午餐 雞腿便當',cid:'food', amt:-95, t:'今天 12:30'},
    {e:'🧋',n:'手搖 大杯微糖',cid:'food', amt:-65, t:'今天 15:10'},
    {e:'🚌',n:'悠遊卡儲值',  cid:'trans',amt:-500,t:'昨天 08:20'},
    {e:'💰',n:'薪水入帳',    cid:'in',   amt:35000,t:'6/05 10:00'},
  ],
  add:{ amount:'', cid:'food', note:'' },
  current:'home'
};

const f = n => 'NT$'+Math.round(n).toLocaleString();
const f0 = n => Math.round(n).toLocaleString();
const tint = (hex,a)=>{const x=hex.replace('#','');return `rgba(${parseInt(x.slice(0,2),16)},${parseInt(x.slice(2,4),16)},${parseInt(x.slice(4,6),16)},${a})`};
const catById = id => state.cats.find(c=>c.id===id);
function monthsLeft(d){const [y,m]=d.split('/').map(Number);return Math.max((y-state.year)*12+(m-state.month),1)}
const netWorth = ()=>state.assets.cash+state.assets.savings+state.assets.invest;
const totalSpent = ()=>state.cats.filter(c=>c.id!=='save'&&c.id!=='invest').reduce((s,c)=>s+c.spent,0);
const totalSaved = ()=>state.cats.filter(c=>c.id==='save'||c.id==='invest').reduce((s,c)=>s+c.spent,0);
const allocated = ()=>state.cats.reduce((s,c)=>s+c.budget,0);
function barColor(c){const p=c.spent/c.budget;if(p>=1)return 'var(--coral)';if(p>=0.85)return '#FF8A4C';return c.c;}
function statusChip(c){const p=c.budget?c.spent/c.budget:0;if(p>=1)return `<span class="overchip">超支 ${f(c.spent-c.budget)}</span>`;if(p>=0.85)return `<span class="warnchip">⚠️ 快超支</span>`;return '';}

function renderHome(){
  const spent=totalSpent(), saved=totalSaved(), bal=state.income-spent-saved;
  const sorted=[...state.cats].filter(c=>c.id!=='save'&&c.id!=='invest').sort((a,b)=>b.spent-a.spent).slice(0,3);
  return `<div class="screen">
    <div class="hi"><div><h1>嗨，早安 👋</h1><div class="sub">${state.month} 月 · 一起變有錢的第 18 天</div></div><div class="avatar">🌱</div></div>
    <div class="hero">
      <div class="lab">💎 淨資產</div>
      <div class="big num">${f(netWorth())}</div>
      <div class="chg">▲ ${f(6300)} 這個月 (+2.5%)</div>
      <div class="split">
        <div><div class="t">現金</div><div class="v num">${f0(state.assets.cash)}</div></div>
        <div><div class="t">儲蓄</div><div class="v num">${f0(state.assets.savings)}</div></div>
        <div><div class="t">投資</div><div class="v num">${f0(state.assets.invest)}</div></div>
      </div>
    </div>
    <div class="flow">
      <div class="card"><div class="t">📥 收入</div><div class="v num" style="color:var(--jade)">${f(state.income)}</div></div>
      <div class="card"><div class="t">📤 已花</div><div class="v num" style="color:var(--coral)">${f(spent)}</div></div>
      <div class="card"><div class="t">🪙 結餘</div><div class="v num">${f(bal)}</div></div>
    </div>
    <div class="sec-title">📊 花最多的地方 <span class="more" data-go="budget">看預算</span></div>
    <div class="card">
      ${sorted.map(c=>{const p=Math.min(c.spent/c.budget,1)*100;return `
        <div class="cat"><div class="ic" style="background:${tint(c.c,.15)}">${c.e}</div>
          <div class="mid"><div class="top"><span class="nm">${c.n} ${statusChip(c)}</span><span class="amt"><b>${f(c.spent)}</b> / ${f0(c.budget)}</span></div>
          <div class="bar"><i style="width:${p}%;background:${barColor(c)}"></i></div></div></div>`}).join('')}
    </div>
    <div class="sec-title">🧾 最近紀錄 <span class="more" data-go="add">＋ 記一筆</span></div>
    <div class="card">${renderTxList(state.tx.slice(0,4))}</div>
  </div>`;
}
function renderTxList(list){
  return list.map(t=>`<div class="tx"><div class="te" style="background:${t.amt>0?'var(--jade-soft)':'#F4F2EC'}">${t.e}</div>
    <div><div class="tn">${t.n}</div><div class="td">${t.t}</div></div>
    <div class="tv ${t.amt>0?'in':''} num">${t.amt>0?'+':'−'}${f0(Math.abs(t.amt))}</div></div>`).join('');
}
function renderBudget(){
  const spent=totalSpent()+totalSaved();
  const usedPct=Math.min(spent/state.income,1)*100;
  const alloc=allocated(), unalloc=state.income-alloc;
  return `<div class="screen">
    <div class="hi"><div><h1>本月預算 💳</h1><div class="sub">拉滑桿分配每一塊錢的工作</div></div><div class="avatar">📐</div></div>
    <div class="card" style="background:linear-gradient(150deg,#FFFDF7,#FFF7E8);border-color:#FFE9BD">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><div style="font-size:12px;color:var(--ink-soft)">總預算（本月收入）</div>
        <div class="num" style="font-family:var(--font-num);font-weight:700;font-size:26px">${f(state.income)}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:var(--ink-soft)">已使用</div>
        <div class="num" style="font-weight:600;color:${usedPct>=85?'var(--coral)':'var(--jade-deep)'}">${usedPct.toFixed(0)}%</div></div>
      </div>
      <div class="bar lg" style="margin-top:12px"><i style="width:${usedPct}%;background:${usedPct>=85?'var(--coral)':'var(--jade)'}"></i></div>
      <div style="display:flex;justify-content:space-between;margin-top:9px;font-size:11.5px">
        <span style="color:var(--ink-soft)">已分配 <b class="num" style="color:var(--ink)">${f0(alloc)}</b></span>
        <span style="color:${unalloc<0?'var(--coral)':'var(--jade)'};font-weight:600">${unalloc<0?'⚠️ 超出 '+f(-unalloc):'剩 '+f(unalloc)+' 可分配'}</span>
      </div>
    </div>
    <div class="sec-title">🎚️ 各分類預算</div>
    <div class="card">
      ${state.cats.map((c,i)=>{const p=Math.min(c.spent/c.budget,1)*100;return `<div class="alloc">
        <div class="ic" style="background:${tint(c.c,.15)}">${c.e}</div>
        <div class="mid"><div class="top"><span class="nm">${c.n} ${statusChip(c)}</span>
          <span class="val num" id="bv-${i}" style="color:${c.c}">${f(c.budget)}</span></div>
          <input type="range" min="0" max="12000" step="100" value="${c.budget}" style="accent-color:${c.c}" oninput="onSlide(${i},this.value)">
          <div style="font-size:11px;color:var(--ink-soft);margin-top:7px">已花 <b class="num">${f(c.spent)}</b> · 還剩 <b class="num" id="rem-${i}" style="color:${c.spent>c.budget?'var(--coral)':'var(--jade-deep)'}">${f(Math.max(c.budget-c.spent,0))}</b></div>
        </div></div>`}).join('')}
    </div>
    <div style="text-align:center;font-size:11.5px;color:var(--ink-faint);margin-top:14px">使用達 85% 會自動提醒你「快超支」⚠️</div>
  </div>`;
}
function onSlide(i,val){
  val=+val; state.cats[i].budget=val; const c=state.cats[i];
  const bv=document.getElementById('bv-'+i); if(bv) bv.textContent=f(val);
  const rem=document.getElementById('rem-'+i);
  if(rem){rem.textContent=f(Math.max(val-c.spent,0));rem.style.color=c.spent>val?'var(--coral)':'var(--jade-deep)';}
}
function renderAdd(){
  const c=catById(state.add.cid);
  const disp=state.add.amount===''?'0':(state.add.amount.endsWith('.')?state.add.amount:(+state.add.amount).toLocaleString());
  return `<div class="screen">
    <div class="hi"><div><h1>記一筆 ✏️</h1><div class="sub">3 秒記好，習慣就養成了</div></div><div class="avatar">${c?c.e:'💸'}</div></div>
    <div class="amount-display card" style="background:linear-gradient(150deg,#fff,#F6FBF8)">
      <div class="lbl">${c?c.n:'選個分類'} 支出</div><div class="big num"><small>$</small>${disp}</div>
    </div>
    <div class="sec-title" style="margin-top:18px">選分類</div>
    <div class="chips">
      ${state.cats.filter(c=>c.id!=='save'&&c.id!=='invest').map(c=>`<div class="chip ${c.id===state.add.cid?'on':''}" onclick="pickCat('${c.id}')"><span class="e">${c.e}</span><span class="n">${c.n}</span></div>`).join('')}
      <div class="chip add" onclick="openAddCat()"><span class="e">＋</span><span class="n">自訂</span></div>
    </div>
    <input class="note-in" placeholder="加個備註（選填）…" value="${state.add.note}" oninput="state.add.note=this.value">
    <div class="keypad">${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k=>`<div class="key" onclick="press('${k}')">${k}</div>`).join('')}</div>
    <button class="btn" onclick="saveTx()">完成 · 記下這筆</button>
  </div>`;
}
function pickCat(id){state.add.cid=id;rerender();}
function press(k){
  let a=state.add.amount;
  if(k==='⌫') a=a.slice(0,-1);
  else if(k==='.'){ if(!a.includes('.')&&a!=='') a+='.'; }
  else { if(a.replace('.','').length<7) a+=k; }
  state.add.amount=a;
  const el=document.querySelector('.amount-display .big');
  if(el) el.innerHTML='<small>$</small>'+(a===''?'0':(a.endsWith('.')?a:(+a).toLocaleString()));
}
function saveTx(){
  const amt=+state.add.amount;
  if(!amt){toast('先輸入金額喔 😉');return;}
  const c=catById(state.add.cid);
  c.spent+=amt; state.assets.cash-=amt;
  state.tx.unshift({e:c.e,n:state.add.note||c.n,cid:c.id,amt:-amt,t:'剛剛'});
  state.add.amount='';state.add.note='';
  const p=c.spent/c.budget;
  toast(p>=1?`記好了！${c.n}已經超支囉 😅`:p>=0.85?`記好了！${c.n}快用完了 ⚠️`:'記好了 ✅ 繼續加油！');
  go('home');
}
function renderGoals(){
  return `<div class="screen">
    <div class="hi"><div><h1>存錢目標 🎯</h1><div class="sub">設定 → 進度條 → 解鎖徽章</div></div><div class="avatar">🏁</div></div>
    ${state.goals.map(g=>{
      const p=Math.min(g.saved/g.target,1), done=g.saved>=g.target;
      const ml=monthsLeft(g.date), need=Math.ceil((g.target-g.saved)/ml);
      return `<div class="card goal ${done?'done':''}" style="margin-bottom:12px">
        ${done?'<div class="ribbon">達成 🎉</div>':''}
        <div class="head"><div class="ge" style="${done?'background:var(--butter-soft)':''}">${g.e}</div>
          <div><div class="gt">${g.n}</div><div class="gd">目標日 ${g.date}</div></div>
          <div class="gright"><div class="p" style="${done?'color:var(--butter)':''}">${Math.round(p*100)}%</div></div></div>
        <div class="bar lg"><i style="width:${p*100}%;background:${done?'linear-gradient(90deg,#FFB72B,#FF9F43)':'linear-gradient(90deg,#16b87a,#0c8a55)'}"></i></div>
        <div class="grow"><span>已存 <b class="num">${f(g.saved)}</b> / ${f(g.target)}</span>
          <span>${done?'<b style="color:var(--butter)">已達標 🏆</b>':`每月需存 <b class="num" style="color:var(--jade-deep)">${f(need)}</b>`}</span></div>
      </div>`}).join('')}
    <button class="btn ghost" onclick="openAddGoal()">＋ 新增一個夢想</button>
    <div class="sec-title">🏅 我的徽章</div>
    <div class="badges">
      <div class="badge"><div class="bi">🐷</div><div class="bn">首次存錢</div></div>
      <div class="badge"><div class="bi">📈</div><div class="bn">投資啟動</div></div>
      <div class="badge"><div class="bi">🔥</div><div class="bn">連續記帳7天</div></div>
      <div class="badge"><div class="bi">🏆</div><div class="bn">完成目標</div></div>
      <div class="badge lock"><div class="bi">💎</div><div class="bn">破10萬</div></div>
      <div class="badge lock"><div class="bi">🦉</div><div class="bn">零超支月</div></div>
    </div>
  </div>`;
}
function renderHealth(){
  const saved=totalSaved();
  const savingsRate=Math.round(saved/state.income*100);
  const over=state.cats.filter(c=>c.spent>c.budget);
  const score=82;
  return `<div class="screen">
    <div class="hi"><div><h1>月底健檢 🩺</h1><div class="sub">${state.month} 月財務體檢報告</div></div><div class="avatar">📋</div></div>
    <div class="score-card">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" style="transform:rotate(-90deg)">
          <circle cx="60" cy="60" r="52" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="10"/>
          <circle cx="60" cy="60" r="52" fill="none" stroke="#FFD98A" stroke-width="10" stroke-linecap="round" stroke-dasharray="${2*Math.PI*52}" stroke-dashoffset="${2*Math.PI*52*(1-score/100)}"/>
        </svg>
        <div class="ringcenter"><div class="gr num">${score}</div><div class="gl">健康分數</div></div>
      </div>
      <div class="verdict">體質不錯，是塊存錢的料 💪</div>
      <div class="sub">這個月你把 <b>${savingsRate}%</b> 的收入存起來＋拿去投資<br>同齡人平均才 12% 而已，你已經贏一波！</div>
    </div>
    <div class="sec-title">💬 給你的白話建議</div>
    <div class="advice"><div class="ae" style="background:var(--coral-soft)">🍔</div>
      <div><div class="ah">娛樂小爆雷</div><div class="ap">娛樂這格超支了 ${f(over.find(c=>c.id==='fun')?over.find(c=>c.id==='fun').spent-2000:200)}，大概就多一場電影＋爆米花。沒事，下個月手指離「結帳」遠一點點就好 🎬</div></div></div>
    <div class="advice"><div class="ae" style="background:var(--butter-soft)">🧋</div>
      <div><div class="ah">手搖 × 外送提醒</div><div class="ap">餐飲這個月花了 ${f(catById('food').spent)}，其中不少是手搖。換算下來大概 28 杯奶茶 🧋 自己帶水一週，就能多存一張小朋友喔。</div></div></div>
    <div class="advice"><div class="ae" style="background:var(--jade-soft)">📈</div>
      <div><div class="ah">投資有持續扣款</div><div class="ap">本月定期定額 ${f(catById('invest').spent)} 有乖乖入帳。複利這位朋友很慢熱，但只要你不中途落跑，它會慢慢報答你的 🌳</div></div></div>
    <div class="advice"><div class="ae" style="background:#EAF4FF">🎯</div>
      <div><div class="ah">下個月小任務</div><div class="ap">把「購物」從 ${Math.round(catById('shop').spent/catById('shop').budget*100)}% 壓回 80% 以下，就能解鎖 <b>零超支月 🦉</b> 徽章。挑戰看看？</div></div></div>
    <button class="btn" style="margin-top:18px" onclick="toast('已存成 6 月報告 📂')">儲存這份報告</button>
  </div>`;
}

let newCat={e:'🍩',n:''};
function openAddCat(){
  newCat={e:'🍩',n:''};
  const emojis=['🍩','☕','🐶','💊','🎁','📚','✈️','💄','⛽','🏋️'];
  sheet(`<h3>新增常用分類</h3><p>取個名字、挑個圖示，之後記帳更快</p>
    <input class="note-in" placeholder="分類名稱，例如：寵物、咖啡…" oninput="newCat.n=this.value">
    <div class="emoji-pick" id="nc-emoji">${emojis.map((e,i)=>`<span class="${i===0?'on':''}" onclick="pickEmoji(this,'${e}')">${e}</span>`).join('')}</div>
    <button class="btn" onclick="confirmAddCat()">加入分類</button>`);
}
function pickEmoji(el,e){document.querySelectorAll('#nc-emoji span').forEach(s=>s.classList.remove('on'));el.classList.add('on');newCat.e=e;}
function confirmAddCat(){
  if(!newCat.n.trim()){toast('幫分類取個名字吧 🙂');return;}
  const id='c'+Date.now();
  state.cats.splice(6,0,{id,n:newCat.n.trim(),e:newCat.e,c:'#7C8B82',budget:1000,spent:0});
  state.add.cid=id; closeSheet(); toast('新分類加好了 🎉'); rerender();
}
let newGoal={e:'🎯',n:'',target:'',date:''};
function openAddGoal(){
  newGoal={e:'🎯',n:'',target:'',date:''};
  const emojis=['🎯','✈️','🏠','🚗','💍','📷','🎓','🎮'];
  sheet(`<h3>新增存錢目標</h3><p>設定金額與日期，App 幫你算每月要存多少</p>
    <input class="note-in" placeholder="想存什麼？例如：沖繩潛水" oninput="newGoal.n=this.value">
    <input class="note-in" type="number" inputmode="numeric" placeholder="目標金額" style="margin-top:10px" oninput="newGoal.target=this.value">
    <input class="note-in" placeholder="完成日期 例如 2027/03" style="margin-top:10px" oninput="newGoal.date=this.value">
    <div class="emoji-pick">${emojis.map((e,i)=>`<span class="${i===0?'on':''}" onclick="document.querySelectorAll('.emoji-pick span').forEach(s=>s.classList.remove('on'));this.classList.add('on');newGoal.e='${e}'">${e}</span>`).join('')}</div>
    <button class="btn" onclick="confirmAddGoal()">建立目標</button>`);
}
function confirmAddGoal(){
  if(!newGoal.n.trim()||!+newGoal.target){toast('名稱跟金額都要填喔 😉');return;}
  state.goals.push({n:newGoal.n.trim(),e:newGoal.e,target:+newGoal.target,saved:0,date:newGoal.date||'2027/01'});
  closeSheet(); toast('新目標建立！開始存吧 🚀'); rerender();
}

function sheet(html){const s=document.getElementById('sheet');s.innerHTML=html;document.getElementById('overlay').classList.add('show');}
function closeSheet(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeSheet();});
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}
const screens={home:renderHome,budget:renderBudget,add:renderAdd,goals:renderGoals,health:renderHealth};
function rerender(){document.getElementById('view').innerHTML=screens[state.current]();}
function go(name){
  state.current=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.go===name));
  rerender(); document.getElementById('view').scrollTop=0;
}
document.getElementById('tabbar').addEventListener('click',e=>{const t=e.target.closest('[data-go]');if(t)go(t.dataset.go);});
document.getElementById('view').addEventListener('click',e=>{const m=e.target.closest('[data-go]');if(m)go(m.dataset.go);});
go('home');
</script>
</body>
</html>
